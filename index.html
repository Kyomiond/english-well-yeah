<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Final Exam Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card: #20233a;
    --border: rgba(255,255,255,0.08);
    --accent: #6c63ff;
    --accent-light: #8a84ff;
    --accent-glow: rgba(108,99,255,0.18);
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.12);
    --text: #f0f0f8;
    --muted: #8b8fa8;
    --label: #c4c6d8;
    --tag-vocab: #6c63ff;
    --tag-vocab-bg: rgba(108,99,255,0.15);
    --tag-grammar: #06b6d4;
    --tag-grammar-bg: rgba(6,182,212,0.15);
    --tag-writing: #f59e0b;
    --tag-writing-bg: rgba(245,158,11,0.15);
    --tag-reading: #22c55e;
    --tag-reading-bg: rgba(34,197,94,0.15);
    --tag-idioms: #ec4899;
    --tag-idioms-bg: rgba(236,72,153,0.15);
    --tag-functional: #f97316;
    --tag-functional-bg: rgba(249,115,22,0.15);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HEADER */
  .site-header {
    background: linear-gradient(135deg, #0f1117 0%, #1a1230 50%, #0f1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 3rem 1.5rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .site-header::before {
    content: '';
    position: absolute;
    top: -80px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(108,99,255,0.2) 0%, transparent 70%);
    pointer-events: none;
  }
  .site-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #ffffff 0%, #a8a4ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }
  .site-header p {
    color: var(--muted);
    font-size: 15px;
  }
  .header-stats {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }
  .hstat {
    text-align: center;
  }
  .hstat-val {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent-light);
    display: block;
  }
  .hstat-lbl {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* LAYOUT */
  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 1.25rem;
  }

  /* CONTROLS */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
    padding: 0.75rem 1.25rem;
  }
  .controls-inner {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .cat-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .cat-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .cat-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 500; }
  .controls-right {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }
  .ctrl-btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .ctrl-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .ctrl-btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .ctrl-btn.primary:hover { background: var(--accent-light); }

  /* PROGRESS */
  .progress-wrap {
    padding: 1.25rem 0 0.5rem;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* SCORE BANNER */
  .score-banner {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    text-align: center;
    margin: 2rem 0;
  }
  .score-banner.visible { display: block; }
  .score-circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: var(--accent-glow);
    border: 3px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent-light);
  }
  .score-banner h2 {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
  }
  .score-banner p { color: var(--muted); margin-bottom: 1.5rem; }
  .score-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px;
    margin-top: 1.5rem;
  }
  .score-cell {
    background: var(--card);
    border-radius: 10px;
    padding: 12px;
    border: 1px solid var(--border);
  }
  .score-cell-val { font-size: 1.3rem; font-weight: 600; color: var(--text); }
  .score-cell-lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* QUESTION CARD */
  .questions-list {
    padding: 1rem 0 4rem;
  }
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }
  .q-card:hover { border-color: rgba(255,255,255,0.14); }
  .q-card.answered-correct { border-color: rgba(34,197,94,0.3); }
  .q-card.answered-wrong { border-color: rgba(239,68,68,0.25); }

  .q-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.9rem;
    gap: 8px;
    flex-wrap: wrap;
  }
  .q-num {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }
  .q-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .tag-Vocabulary { background: var(--tag-vocab-bg); color: var(--tag-vocab); }
  .tag-Grammar { background: var(--tag-grammar-bg); color: var(--tag-grammar); }
  .tag-Writing { background: var(--tag-writing-bg); color: var(--tag-writing); }
  .tag-Reading { background: var(--tag-reading-bg); color: var(--tag-reading); }
  .tag-Idioms { background: var(--tag-idioms-bg); color: var(--tag-idioms); }
  .tag-Functional { background: var(--tag-functional-bg); color: var(--tag-functional); }

  .q-text {
    font-size: 15px;
    color: var(--text);
    line-height: 1.65;
    margin-bottom: 1rem;
    font-weight: 500;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .opt-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 9px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: var(--label);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    text-align: left;
    line-height: 1.5;
    transition: all 0.14s;
  }
  .opt-btn:hover:not(:disabled) {
    border-color: rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06);
    color: var(--text);
  }
  .opt-btn .opt-letter {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    min-width: 18px;
    padding-top: 1px;
  }
  .opt-btn.correct {
    background: var(--green-bg);
    border-color: rgba(34,197,94,0.4);
    color: var(--green);
  }
  .opt-btn.correct .opt-letter { color: var(--green); }
  .opt-btn.wrong {
    background: var(--red-bg);
    border-color: rgba(239,68,68,0.3);
    color: var(--red);
  }
  .opt-btn.wrong .opt-letter { color: var(--red); }
  .opt-btn.reveal-correct {
    background: var(--green-bg);
    border-color: rgba(34,197,94,0.3);
    color: var(--green);
    opacity: 0.75;
  }
  .opt-btn.reveal-correct .opt-letter { color: var(--green); }
  .opt-btn:disabled { cursor: default; }

  .feedback {
    margin-top: 10px;
    font-size: 13px;
    padding: 9px 13px;
    border-radius: 8px;
    display: none;
    line-height: 1.5;
  }
  .feedback.show { display: block; }
  .feedback.ok { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
  .feedback.no { background: var(--red-bg); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-size: 13px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .site-header { padding: 2rem 1rem 1.5rem; }
    .header-stats { gap: 1.25rem; }
    .controls-right { margin-left: 0; width: 100%; justify-content: flex-end; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <h1>English Final Exam</h1>
    <p>Vocabulary &bull; Grammar &bull; Writing &bull; Reading &bull; Idioms &bull; Functional Language</p>
    <div class="header-stats">
      <div class="hstat"><span class="hstat-val" id="totalQ">0</span><span class="hstat-lbl">Questions</span></div>
      <div class="hstat"><span class="hstat-val" id="totalAnswered">0</span><span class="hstat-lbl">Answered</span></div>
      <div class="hstat"><span class="hstat-val" id="totalCorrect">0</span><span class="hstat-lbl">Correct</span></div>
      <div class="hstat"><span class="hstat-val" id="totalScore">0%</span><span class="hstat-lbl">Score</span></div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="controls-inner">
    <button class="cat-btn active" onclick="filterCat('All')">All</button>
    <button class="cat-btn" onclick="filterCat('Vocabulary')">Vocabulary</button>
    <button class="cat-btn" onclick="filterCat('Grammar')">Grammar</button>
    <button class="cat-btn" onclick="filterCat('Writing')">Writing</button>
    <button class="cat-btn" onclick="filterCat('Reading')">Reading</button>
    <button class="cat-btn" onclick="filterCat('Idioms')">Idioms</button>
    <button class="cat-btn" onclick="filterCat('Functional')">Functional</button>
    <div class="controls-right">
      <button class="ctrl-btn" onclick="resetAll()">Reset</button>
      <button class="ctrl-btn primary" onclick="showResults()">See results</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="progText">0 / 0 answered</span>
      <span id="progPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
  </div>

  <div class="score-banner" id="scoreBanner">
    <div class="score-circle" id="scoreCircle">0%</div>
    <h2 id="scoreGrade">Great work!</h2>
    <p id="scoreMsg"></p>
    <div class="score-grid" id="scoreGrid"></div>
  </div>

  <div class="questions-list" id="qList"></div>
</div>

<footer>
  <p>English Final Exam &mdash; All questions from your study material</p>
</footer>

<script>
const QUESTIONS = [

  // ══════════════════════════════════════════

  {cat:"Reading", q:"[Maya Passage] The Maya civilization began after 1000 CE.", opts:["True","False"], ans:1},
  {cat:"Reading", q:"[Maya Passage] Warfare was possibly one reason for the decline of some Maya cities.", opts:["True","False"], ans:0},

  // ══════════════════════════════════════════
  //  READING – Passage 4: Mental Health
  // ══════════════════════════════════════════
  {cat:"Reading", q:"[Mental Health Passage] Mental health only refers to the absence of mental illness.", opts:["True","False"], ans:1},
  {cat:"Reading", q:"[Mental Health Passage] Mental health affects how people handle stress.", opts:["True","False"], ans:0},
  {cat:"Reading", q:"[Mental Health Passage] Academic pressure and social media can affect young people's mental health.", opts:["True","False"], ans:0},
  {cat:"Reading", q:"[Mental Health Passage] Anxiety and depression are examples of mental health conditions.", opts:["True","False"], ans:0},
  {cat:"Reading", q:"[Mental Health Passage] Mental health problems never affect physical health.", opts:["True","False"], ans:1},
  {cat:"Reading", q:"[Mental Health Passage] Therapy and counseling can help treat mental health issues.", opts:["True","False"], ans:0},
  {cat:"Reading", q:"[Mental Health Passage] Stigma around mental health makes it harder for people to seek help.", opts:["True","False"], ans:0},
  {cat:"Reading", q:"[Mental Health Passage] Schools are starting to pay more attention to mental health education.", opts:["True","False"], ans:0},
  {cat:"Reading", q:"[Mental Health Passage] Exercise and good sleep have no effect on mental well-being.", opts:["True","False"], ans:1},
  {cat:"Reading", q:"[Mental Health Passage] Mental health is as important as physical health according to the passage.", opts:["True","False"], ans:0},
  {cat:"Reading", q:"[Mental Health Passage] Early intervention cannot prevent serious mental health problems.", opts:["True","False"], ans:1},
  {cat:"Reading", q:"[Mental Health Passage] Social connections support good mental health.", opts:["True","False"], ans:0},
  {cat:"Reading", q:"[Mental Health Passage] Economic uncertainty is mentioned as a possible factor affecting mental health.", opts:["True","False"], ans:0},
  {cat:"Reading", q:"[Mental Health Passage] The passage suggests that mental health awareness has decreased recently.", opts:["True","False"], ans:1},
  {cat:"Reading", q:"[Mental Health Passage] Strong social relationships can help mental well-being.", opts:["True","False"], ans:0},

];

// ─── STATE ───────────────────────────────────
let currentCat = "All";
let userAnswers = {};
let displayedQuestions = [];

// ─── INIT ─────────────────────────────────────
function init() {
  displayedQuestions = QUESTIONS.map((q, i) => ({...q, origIdx: i}));
  renderQuestions();
  updateStats();
}

// ─── FILTER ───────────────────────────────────
function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === cat);
  });
  displayedQuestions = cat === "All"
    ? QUESTIONS.map((q, i) => ({...q, origIdx: i}))
    : QUESTIONS.map((q, i) => ({...q, origIdx: i})).filter(q => q.cat === cat);
  renderQuestions();
  updateStats();
  hideBanner();
}

// ─── RENDER ───────────────────────────────────
function renderQuestions() {
  const list = document.getElementById("qList");
  const letters = ["A","B","C","D","E","F"];
  list.innerHTML = displayedQuestions.map((q, idx) => {
    const uid = q.origIdx;
    const userAns = userAnswers[uid];
    const answered = userAns !== undefined;
    const cardCls = answered ? (userAns === q.ans ? "answered-correct" : "answered-wrong") : "";

    const optsHtml = q.opts.map((o, i) => {
      let cls = "opt-btn";
      if (answered) {
        if (i === q.ans) cls += " correct";
        else if (i === userAns && userAns !== q.ans) cls += " wrong";
      }
      return `<button class="${cls}" onclick="selectAnswer(${uid},${i})" ${answered?"disabled":""}><span class="opt-letter">${letters[i]}</span>${o.replace(/^[A-D]\) /,"")}</button>`;
    }).join("");

    let feedback = "";
    if (answered) {
      if (userAns === q.ans) {
        feedback = `<div class="feedback ok show">✓ Correct!</div>`;
      } else {
        const correctText = q.opts[q.ans].replace(/^[A-D]\) /,"");
        feedback = `<div class="feedback no show">✗ Incorrect. The correct answer is: <strong>${correctText}</strong></div>`;
      }
    }

    return `
      <div class="q-card ${cardCls}" id="card-${uid}">
        <div class="q-top">
          <span class="q-num">Q${idx + 1}</span>
          <span class="q-tag tag-${q.cat}">${q.cat}</span>
        </div>
        <p class="q-text">${q.q.replace(/\n/g,"<br>")}</p>
        <div class="options">${optsHtml}</div>
        ${feedback}
      </div>`;
  }).join("");
}

// ─── ANSWER ───────────────────────────────────
function selectAnswer(uid, idx) {
  if (userAnswers[uid] !== undefined) return;
  userAnswers[uid] = idx;
  updateStats();

  const q = QUESTIONS[uid];
  const card = document.getElementById("card-" + uid);
  if (!card) return;

  card.classList.toggle("answered-correct", idx === q.ans);
  card.classList.toggle("answered-wrong", idx !== q.ans);

  const btns = card.querySelectorAll(".opt-btn");
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.ans) b.classList.add("correct");
    else if (i === idx && idx !== q.ans) b.classList.add("wrong");
  });

  const correctText = q.opts[q.ans].replace(/^[A-D]\) /,"");
  const fb = document.createElement("div");
  fb.className = idx === q.ans ? "feedback ok show" : "feedback no show";
  fb.innerHTML = idx === q.ans
    ? "✓ Correct!"
    : `✗ Incorrect. The correct answer is: <strong>${correctText}</strong>`;
  card.appendChild(fb);
}

// ─── STATS ────────────────────────────────────
function updateStats() {
  const total = QUESTIONS.length;
  const answered = Object.keys(userAnswers).length;
  const correct = Object.keys(userAnswers).filter(k => userAnswers[k] === QUESTIONS[k].ans).length;
  const pct = answered > 0 ? Math.round((correct / answered) * 100) : 0;

  document.getElementById("totalQ").textContent = total;
  document.getElementById("totalAnswered").textContent = answered;
  document.getElementById("totalCorrect").textContent = correct;
  document.getElementById("totalScore").textContent = pct + "%";

  const dispAnswered = displayedQuestions.filter(q => userAnswers[q.origIdx] !== undefined).length;
  const dispTotal = displayedQuestions.length;
  const progPct = dispTotal > 0 ? Math.round((dispAnswered / dispTotal) * 100) : 0;
  document.getElementById("progFill").style.width = progPct + "%";
  document.getElementById("progText").textContent = `${dispAnswered} / ${dispTotal} answered`;
  document.getElementById("progPct").textContent = progPct + "%";
}

// ─── RESULTS ──────────────────────────────────
function showResults() {
  const banner = document.getElementById("scoreBanner");
  const dispAns = displayedQuestions.filter(q => userAnswers[q.origIdx] !== undefined);
  const correct = dispAns.filter(q => userAnswers[q.origIdx] === q.ans).length;
  const total = displayedQuestions.length;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;

  const grade = pct >= 90 ? "Excellent work! 🎉"
    : pct >= 75 ? "Good job! 👍"
    : pct >= 60 ? "Keep practicing! 📚"
    : "More review needed. 💪";

  document.getElementById("scoreCircle").textContent = pct + "%";
  document.getElementById("scoreGrade").textContent = grade;
  document.getElementById("scoreMsg").textContent = `${correct} out of ${total} correct`;

  const cats = {};
  displayedQuestions.forEach(q => {
    if (!cats[q.cat]) cats[q.cat] = {c:0,t:0};
    cats[q.cat].t++;
    if (userAnswers[q.origIdx] === q.ans) cats[q.cat].c++;
  });

  document.getElementById("scoreGrid").innerHTML = Object.entries(cats).map(([cat,s]) =>
    `<div class="score-cell">
      <div class="score-cell-val">${s.c}/${s.t}</div>
      <div class="score-cell-lbl">${cat}</div>
    </div>`
  ).join("");

  banner.classList.add("visible");
  banner.scrollIntoView({behavior:"smooth", block:"start"});
}

function hideBanner() {
  document.getElementById("scoreBanner").classList.remove("visible");
}

// ─── RESET ────────────────────────────────────
function resetAll() {
  userAnswers = {};
  updateStats();
  hideBanner();
  renderQuestions();
}

init();
</script>
